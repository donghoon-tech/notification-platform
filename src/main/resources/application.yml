spring:
  application:
    name: notification-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 100
      minimum-idle: 20
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1
      properties:
        linger.ms: 10
        batch.size: 32768
        compression.type: snappy
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.notification.platform.messaging.event"
    topic:
      inbound: notification.requests
      inapp: notification.inapp
      email: notification.email
      retry: notification.retry
      dlq: notification.dlq
  mail:
    host: 127.0.0.1
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379

server:
  port: 8080
  tomcat:
    threads:
      max: 400
      min-spare: 50
    max-connections: 20000
    accept-count: 2000

platform:
  api-key: "v1-secret-key-123"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.SQL: INFO
    com.notification.platform: INFO
